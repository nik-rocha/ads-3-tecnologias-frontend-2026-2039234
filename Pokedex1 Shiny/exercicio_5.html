<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Charmander</title>
        <style>
            body {
                font-family: Arial;
                background-color: #f4f4f4;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .card {
                background-color: white;
                width: 300px;
                border-radius: 10px;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.435);
                text-align: center;
                padding: 20px;
            }

            .card img {
                width: 250px;
                /*Define uma transição suave para a propriedade transform*/
                transition: transform 0.3s;

            }

            .card img:hover {
                /*Regra que aplica uma transformação sobre a tag img
                no caso aumenta a escala da tag em 5%*/
                transform: scale(1.05);
            }

            .mais {
                text-align: left;
                display: none;
            }
        </style>
    </head>    
    <body>
        <div class="card">
            <h1 id="titulo">Kyogre</h1>
            <img id="imagem" src="https://archives.bulbagarden.net/media/upload/thumb/5/51/0382Kyogre.png/800px-0382Kyogre.png" alt="Kyogre">
            <p id="descricao">
                Through Primal Reversion and with nature’s full power, it will take back its true form. It can summon storms that cause the sea levels to rise.
            </p>
            <button id="botao">Mostrar Mais</button>
            <ul id="mais" class="mais">
                <li>Type: Water</li>
                <li>Weakness: Plant, Electric</li>
                <li>Category: Sea Basin</li>
            </ul>
        </div>
    </body>
    <script>
        let imagem = document.getElementById("imagem")
        let titulo = document.getElementById("titulo")
        let botao = document.getElementById("botao")
        let mais = document.getElementById("mais")
        console.log(mais.style.textAlign)

        imagem.addEventListener("mouseover", function() {
            titulo.textContent = "Kyogre Shiny"
            imagem.src = "https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/i/e48d6b9d-3b1d-46a0-a254-3a448ec3a8a5/ddjoz51-209f9d5e-29a7-49c3-9b95-54e90f270cb6.png"
        })

        imagem.addEventListener("mouseout", function() {
            titulo.textContent = "Kyogre"
            imagem.src = "https://archives.bulbagarden.net/media/upload/thumb/5/51/0382Kyogre.png/800px-0382Kyogre.png"
        })

        botao.addEventListener("click", function() {
            console.log("Botão clicado!")
            let mudar = mais.style.display == "none" ? "block" : "none"
            mais.style.display = mudar
        })
    </script>
</html>
